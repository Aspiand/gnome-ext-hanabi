name: Update nixpkgs hash

on:
  schedule:
    # Weekly Monday 06:00 UTC — nixpkgs master rolling, hash perlu di-refresh
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake.lock (nixpkgs hash)
        uses: DeterminateSystems/update-flake-lock@main
        with:
          inputs: nixpkgs
          commit-msg: "chore: update nixpkgs hash in flake.lock"
          pr-title: "chore: update nixpkgs hash"
          pr-body: |
            Auto-update nixpkgs input hash via `nix flake update`.

            Triggered by weekly schedule or manual workflow_dispatch.
          pr-labels: |
            automated
            dependencies
